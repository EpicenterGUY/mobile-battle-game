<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일 온라인 배틀</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111827; color: white; }
    .app { max-width: 520px; margin: 0 auto; min-height: 100vh; padding: 18px; }
    h1 { font-size: 28px; margin: 12px 0 6px; text-align: center; }
    h2 { text-align: center; margin: 8px 0; }
    .subtitle { text-align: center; color: #9ca3af; margin-bottom: 20px; font-size: 14px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 18px; padding: 16px; margin-bottom: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .hidden { display: none; }
    button { width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 800; margin-top: 10px; background: #60a5fa; color: #111827; }
    button:disabled { background: #4b5563; color: #9ca3af; }
    input { width: 100%; border: 1px solid #4b5563; background: #111827; color: white; border-radius: 14px; padding: 14px; font-size: 18px; text-align: center; text-transform: uppercase; }
    .room-code { font-size: 34px; font-weight: 900; text-align: center; letter-spacing: 4px; color: #facc15; margin: 10px 0; }
    .status { font-size: 14px; color: #d1d5db; text-align: center; line-height: 1.6; }
    .mode-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
    .mode-desc { color: #d1d5db; font-size: 14px; line-height: 1.6; }
    .character-grid { display: grid; gap: 12px; margin-top: 12px; }
    .character-card, .unit-row { background: #111827; border: 1px solid #374151; border-radius: 16px; padding: 14px; }
    .character-name { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
    .character-info { color: #d1d5db; font-size: 14px; line-height: 1.6; }
    .passive { color: #facc15; font-weight: 800; }
    .skill-area, .party-actions { display: grid; gap: 8px; margin-top: 8px; }
    .skill-button, .target-button, .rotate-button { text-align: left; line-height: 1.4; }
    .skill-name { font-size: 16px; font-weight: 900; }
    .skill-power { font-size: 12px; font-weight: 800; color: #111827; opacity: 0.95; margin-top: 3px; }
    .skill-desc { font-size: 12px; color: #111827; opacity: 0.85; margin-top: 3px; }
    .log { white-space: pre-line; background: #030712; border: 1px solid #374151; border-radius: 14px; padding: 14px; min-height: 120px; line-height: 1.6; color: #e5e7eb; }
    .small { font-size: 13px; color: #9ca3af; text-align: center; margin-top: 10px; line-height: 1.5; }
    .danger { background: #f87171; color: #111827; }
    .secondary { background: #a78bfa; color: #111827; }
    .green { background: #34d399; color: #111827; }
    .yellow { background: #facc15; color: #111827; }
    .line { border: 0; border-top: 1px solid #374151; margin: 18px 0; }
    .party-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .party-title { font-size: 16px; font-weight: 900; margin-bottom: 8px; text-align: center; }
    .party-label { font-size: 13px; color: #facc15; font-weight: 900; margin: 8px 0 6px; }
    .unit-row { padding: 10px; margin-bottom: 8px; }
    .unit-row.active { border-color: #facc15; box-shadow: 0 0 0 1px #facc15 inset; }
    .unit-row.dead { opacity: 0.45; border-color: #4b5563; background: #0f172a; }
    .unit-row.dead .unit-name { color: #f87171; }
    .unit-name { font-size: 14px; font-weight: 900; margin-bottom: 4px; }
    .unit-detail { font-size: 12px; color: #d1d5db; line-height: 1.4; }
    .hpbar { width: 100%; height: 18px; background: #374151; border-radius: 999px; overflow: hidden; }
    .hpfill { height: 100%; width: 100%; background: #22c55e; transition: width 0.25s; }
    .turn { text-align: center; font-size: 20px; font-weight: 900; margin: 16px 0 8px; }
  </style>
</head>

<body>
  <div class="app">
    <h1>온라인 배틀</h1>
    <div class="subtitle">모바일 턴제 대전 테스트</div>

    <section id="modeSelect" class="card">
      <div class="mode-title">모드 선택</div>
      <div class="mode-desc">
        온라인 멀티도 4인 파티 베타로 확장되었습니다.<br>
        싱글 AI와 온라인 모두 메인 2명 / 서브 2명 구조입니다.
      </div>
      <button id="onlineModeBtn">온라인 멀티 4인 파티</button>
      <button id="singleModeBtn" class="yellow">싱글 AI 4인 파티</button>
    </section>

    <section id="lobby" class="card hidden">
      <button id="createRoomBtn">방 만들기</button>
      <hr class="line">
      <input id="roomInput" maxlength="4" placeholder="방 코드 입력" />
      <button id="joinRoomBtn">방 참가</button>
      <button id="backToModeBtn" class="secondary">모드 선택으로</button>
      <div class="small">방을 만들거나 참가한 뒤 파티 4명을 선택합니다.</div>
    </section>

    <section id="waiting" class="card hidden">
      <div class="status">방 코드</div>
      <div id="roomCodeView" class="room-code">----</div>
      <div id="waitingText" class="status">기다리는 중...</div>
      <button id="copyCodeBtn" class="secondary">방 코드 복사</button>
      <button id="waitingBackBtn" class="danger">나가기</button>
    </section>

    <section id="selectCharacter" class="card hidden">
      <div class="status" id="selectTopLabel">파티 선택</div>
      <div id="selectRoomCodeView" class="room-code">0/4</div>
      <h2 id="selectTitle">파티 4명 선택</h2>
      <div id="myRoleText" class="status">선택 순서대로 1,2번은 메인 / 3,4번은 서브입니다.</div>
      <div id="characterList" class="character-grid"></div>
      <button id="selectBackBtn" class="secondary">뒤로가기</button>
    </section>

    <section id="partyBattle" class="card hidden">
      <div class="party-grid">
        <div>
          <div id="leftPartyTitle" class="party-title">플레이어</div>
          <div class="party-label">메인</div>
          <div id="leftMainList"></div>
          <div class="party-label">서브</div>
          <div id="leftSubList"></div>
        </div>
        <div>
          <div id="rightPartyTitle" class="party-title">AI</div>
          <div class="party-label">메인</div>
          <div id="rightMainList"></div>
          <div class="party-label">서브</div>
          <div id="rightSubList"></div>
        </div>
      </div>

      <div id="partyTurnText" class="turn">대기 중...</div>
      <div id="partyActionButtons" class="party-actions"></div>
      <div style="height: 14px;"></div>
      <div id="partyLog" class="log">전투 로그</div>
      <button id="partyResetBtn" class="secondary">다시 시작</button>
      <button id="partyLeaveBtn" class="danger">나가기</button>
    </section>
  </div>

    const skills = {

      berserk_axe: { id: "berserk_axe", name: "광란의 도끼", type: "attack", power: 28, powerText: "위력 28 / 적 메인 1명", desc: "강력한 도끼 공격을 가한다." },
      blood_slash: { id: "blood_slash", name: "피의 참격", type: "attackBuff", power: 16, buff: 6, powerText: "위력 16 / 다음 공격 +6", desc: "피를 끓어오르게 해 다음 공격을 강화한다." },
      rage: { id: "rage", name: "분노 폭발", type: "attackBuff", power: 8, buff: 10, powerText: "위력 8 / 다음 공격 +10", desc: "약한 피해를 주고 다음 공격을 크게 강화한다." },
      priest_heal: { id: "priest_heal", name: "치유", type: "heal", heal: 32, powerText: "회복 32 / 자신", desc: "자신의 HP를 크게 회복한다." },
      judgment: { id: "judgment", name: "빛의 심판", type: "attack", power: 18, powerText: "위력 18 / 적 메인 1명", desc: "성스러운 빛으로 피해를 준다." },
      blessing: { id: "blessing", name: "축복", type: "attackBuff", power: 5, buff: 8, powerText: "위력 5 / 다음 공격 +8", desc: "약한 피해를 주고 다음 공격을 강화한다." },
      pierce_arrow: { id: "pierce_arrow", name: "관통 화살", type: "attack", power: 19, powerText: "위력 19 / 적 메인 1명", desc: "날카로운 화살로 안정적인 피해를 준다." },
      rapid_shot: { id: "rapid_shot", name: "연속 사격", type: "attack", power: 16, powerText: "위력 16 / 적 메인 1명", desc: "빠른 사격으로 피해를 준다." },
      focus_aim: { id: "focus_aim", name: "집중 조준", type: "attackBuff", power: 7, buff: 12, powerText: "위력 7 / 다음 공격 +12", desc: "가벼운 피해를 주고 다음 공격을 크게 강화한다." },
      curse: { id: "curse", name: "저주", type: "attackDebuff", power: 8, debuff: 8, powerText: "위력 8 / 다음 공격 피해 -8", desc: "저주를 걸어 상대의 다음 공격을 약화한다." },
      soul_drain: { id: "soul_drain", name: "영혼 흡수", type: "attack", power: 17, powerText: "위력 17 / 적 메인 1명", desc: "영혼을 갉아먹는 피해를 준다." },
      dark_orb: { id: "dark_orb", name: "암흑 구체", type: "attack", power: 22, powerText: "위력 22 / 적 메인 1명", desc: "어둠의 구체로 큰 피해를 준다." }
    };

    const characters = {
      "검사": { name: "검사", hp: 110, atk: 15, def: 8, passiveName: "검의 호흡", passiveDesc: "공격 시 20% 확률로 추가 피해 8", skillIds: ["slash", "guard", "halfmoon"] },
      "마법사": { name: "마법사", hp: 80, atk: 22, def: 3, passiveName: "마력 순환", passiveDesc: "자신의 3번째 행동마다 공격 스킬 피해 +10", skillIds: ["fireball", "ice", "heal"] },
      "도적": { name: "도적", hp: 90, atk: 13, def: 5, passiveName: "그림자 걸음", passiveDesc: "공격받을 때 15% 확률로 공격 회피", skillIds: ["poison", "weak", "smoke"] },
      "탱커": { name: "탱커", hp: 150, atk: 9, def: 15, passiveName: "불굴의 육체", passiveDesc: "HP가 40% 이하일 때 받는 피해 20% 감소", skillIds: ["shield_bash", "fortress", "heavy_strike"] },
      "광전사": { name: "광전사", hp: 105, atk: 22, def: 4, passiveName: "피의 갈망", passiveDesc: "HP가 50% 이하일 때 공격 피해 +10", skillIds: ["berserk_axe", "blood_slash", "rage"] },
      "성직자": { name: "성직자", hp: 95, atk: 10, def: 7, passiveName: "성스러운 가호", passiveDesc: "회복 스킬의 회복량 20% 증가", skillIds: ["priest_heal", "judgment", "blessing"] },
      "궁수": { name: "궁수", hp: 90, atk: 17, def: 5, passiveName: "매의 눈", passiveDesc: "공격 시 15% 확률로 추가 피해 10", skillIds: ["pierce_arrow", "rapid_shot", "focus_aim"] },
      "주술사": { name: "주술사", hp: 85, atk: 16, def: 4, passiveName: "저주의 낙인", passiveDesc: "독 또는 공격감소 상태의 적에게 피해 +8", skillIds: ["curse", "soul_drain", "dark_orb"] }

    let currentMode = null;
    let currentRoomCode = null;
    let mySide = null;
    let partySelection = [];
    let singlePartyState = null;
    let latestOnlineBattle = null;
    let partyBusy = false;
    let pendingPartySkillId = null;

    const modeSelect = document.getElementById("modeSelect");
    const lobby = document.getElementById("lobby");
    const waiting = document.getElementById("waiting");
    const selectCharacter = document.getElementById("selectCharacter");

    const joinRoomBtn = document.getElementById("joinRoomBtn");
    const roomInput = document.getElementById("roomInput");
    const backToModeBtn = document.getElementById("backToModeBtn");
    const roomCodeView = document.getElementById("roomCodeView");

    const selectRoomCodeView = document.getElementById("selectRoomCodeView");

    const selectBackBtn = document.getElementById("selectBackBtn");
    const leftPartyTitle = document.getElementById("leftPartyTitle");
    const rightPartyTitle = document.getElementById("rightPartyTitle");
    const leftMainList = document.getElementById("leftMainList");
    const leftSubList = document.getElementById("leftSubList");
    const rightMainList = document.getElementById("rightMainList");
    const rightSubList = document.getElementById("rightSubList");
    const partyTurnText = document.getElementById("partyTurnText");
    const partyActionButtons = document.getElementById("partyActionButtons");
    const partyLog = document.getElementById("partyLog");
    const partyResetBtn = document.getElementById("partyResetBtn");
    const partyLeaveBtn = document.getElementById("partyLeaveBtn");

    function showScreen(name) {
      modeSelect.classList.add("hidden");
      lobby.classList.add("hidden");
      waiting.classList.add("hidden");
      selectCharacter.classList.add("hidden");
      partyBattle.classList.add("hidden");
      if (name === "mode") modeSelect.classList.remove("hidden");
      if (name === "lobby") lobby.classList.remove("hidden");
      if (name === "waiting") waiting.classList.remove("hidden");
      if (name === "select") selectCharacter.classList.remove("hidden");
      if (name === "partyBattle") partyBattle.classList.remove("hidden");
    }

    function makeRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function makePlayerFromCharacter(charName) {
      const c = characters[charName];
      return { selected: true, character: c.name, hp: c.hp, maxHp: c.hp, atk: c.atk, def: c.def, passiveName: c.passiveName, passiveDesc: c.passiveDesc, skillIds: c.skillIds, turnCount: 0, guardRate: 0, evasion: false, atkBuff: 0, atkDebuff: 0, poison: 0 };
    }

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function alive(unit) { return unit && unit.hp > 0; }
    function getSkillListForPlayer(player) { return ["basic", ...(player.skillIds || [])]; }
    function isTargetSkill(skill) { return ["attack", "attackBuff", "attackDebuff", "poisonAttack", "weakAttack"].includes(skill.type); }
    function getTeam(state, side) { return state.teams[side]; }
    function getEnemySide(state, side) { return state.sides.find(s => s !== side); }

    function sideLabel(side) {
      if (side === "player") return "플레이어";
      if (side === "ai") return "AI";
      if (side === "p1") return "1P";
      if (side === "p2") return "2P";
      return side;
    }

    function getStateText(player) {
      const list = [];
      if (player.guardRate > 0) list.push("방어");
      if (player.evasion) list.push("연막");
      if (player.atkBuff > 0) list.push(`공격강화 +${player.atkBuff}`);
      if (player.atkDebuff > 0) list.push(`공격감소 -${player.atkDebuff}`);
      if (player.poison > 0) list.push(`독 ${player.poison}`);
      return list.length ? list.join(" / ") : "상태 없음";
    }

    function createBattleState(leftSide, rightSide, leftParty, rightParty, log) {
      return { sides: [leftSide, rightSide], turnIndex: 0, round: 1, winner: "", teams: { [leftSide]: leftParty, [rightSide]: rightParty }, log };
    }

    function getTurnInfo(state) {
      const [a, b] = state.sides;
      const order = [{ side: a, slot: 0 }, { side: b, slot: 0 }, { side: a, slot: 1 }, { side: b, slot: 1 }];
      return order[state.turnIndex];
    }

    function applyDamageCore(attacker, defender, basePower, extra = {}, logs = [], attackerLabel = "", defenderLabel = "") {
      if (!alive(defender)) return { hit: false, damage: 0 };

      if (defender.evasion) {
        defender.evasion = false;
        if (Math.random() < 0.4) {
          logs.push(`${defenderLabel} ${defender.character}이 연막으로 공격을 회피했다!`);
          return { hit: false, damage: 0 };
        }
      }

      if (defender.character === "도적" && Math.random() < 0.15) {
        logs.push(`${defenderLabel} ${defender.character}의 패시브 [그림자 걸음] 발동!`);
        logs.push("공격을 회피했다!");
        return { hit: false, damage: 0 };
      }

      let damage = basePower + attacker.atk - defender.def + Math.floor(Math.random() * 5);

      if (extra.bonusIfPoison && defender.poison > 0) {
        damage += extra.bonusIfPoison;
        logs.push("독 상태의 약점을 찔렀다!");
      }
      if (attacker.atkBuff > 0) {
        damage += attacker.atkBuff;
        logs.push(`${attackerLabel} ${attacker.character}의 공격 강화 효과!`);
        attacker.atkBuff = 0;
      }
      if (attacker.atkDebuff > 0) {
        damage -= attacker.atkDebuff;
        logs.push(`${attackerLabel} ${attacker.character}은 공격 감소 상태다!`);
        attacker.atkDebuff = 0;
      }
      if (attacker.character === "검사" && Math.random() < 0.2) {
        damage += 8;
        logs.push(`${attacker.character}의 패시브 [검의 호흡] 발동!`);
      }
      if (attacker.character === "마법사" && attacker.turnCount % 3 === 0) {
        damage += 10;
        logs.push(`${attacker.character}의 패시브 [마력 순환] 발동!`);
      }
      if (attacker.character === "광전사" && attacker.hp <= attacker.maxHp * 0.5) {
        damage += 10;
        logs.push(`${attacker.character}의 패시브 [피의 갈망] 발동!`);
      }
      if (attacker.character === "궁수" && Math.random() < 0.15) {
        damage += 10;
        logs.push(`${attacker.character}의 패시브 [매의 눈] 발동!`);
      }
      if (attacker.character === "주술사" && (defender.poison > 0 || defender.atkDebuff > 0)) {
        damage += 8;
        logs.push(`${attacker.character}의 패시브 [저주의 낙인] 발동!`);
      }
      if (defender.character === "탱커" && defender.hp <= defender.maxHp * 0.4) {
        damage = Math.floor(damage * 0.8);
        logs.push(`${defender.character}의 패시브 [불굴의 육체] 발동!`);
      }
      if (defender.guardRate > 0) {
        damage = Math.floor(damage * (1 - defender.guardRate));
        defender.guardRate = 0;
        logs.push(`${defenderLabel} ${defender.character}이 방어로 피해를 줄였다!`);
      }

      damage = Math.max(1, damage);
      defender.hp = Math.max(0, defender.hp - damage);
      return { hit: true, damage };
    }

    function applyPoisonStart(state, side, slot) {
      const actor = getTeam(state, side)[slot];
      let log = "";
      if (actor && actor.poison > 0) {
        actor.poison -= 1;
        actor.hp = Math.max(0, actor.hp - 5);
        log += `${sideLabel(side)} ${actor.character}은 독으로 5 피해를 받았다!\n`;
      }
      return log;
    }

    function autoPromote(team, logs = []) {
      for (let slot = 0; slot < 2; slot++) {
        if (!alive(team[slot])) {
          const subIndex = [2, 3].find(i => alive(team[i]));
          if (subIndex !== undefined) {
            const fallen = team[slot]?.character || "빈 자리";
            const incoming = team[subIndex].character;
            [team[slot], team[subIndex]] = [team[subIndex], team[slot]];
            logs.push(`${fallen} 대신 ${incoming}이 메인으로 출전!`);
          }
        }
      }
    }

    function autoPromoteAll(state, logs = []) {
      state.sides.forEach(side => autoPromote(state.teams[side], logs));
    }

    function checkWinner(state) {
      const aliveSides = state.sides.filter(side => state.teams[side].some(alive));
      if (aliveSides.length === 1) state.winner = aliveSides[0];
      return state.winner;
    }

    function processPartyRotate(oldState, subIndex) {
      const state = clone(oldState);
      const info = getTurnInfo(state);
      const team = getTeam(state, info.side);
      const actor = team[info.slot];
      const sub = team[subIndex];
      let log = applyPoisonStart(state, info.side, info.slot);

      if (!alive(actor)) {
        log += `${actor?.character || "빈 자리"}이 쓰러져 로테이션할 수 없습니다.`;
      } else if (!alive(sub)) {
        log += `${sub?.character || "빈 자리"}은 쓰러져 로테이션할 수 없습니다.`;
      } else {
        [team[info.slot], team[subIndex]] = [team[subIndex], team[info.slot]];
        log += `로테이션! ${sideLabel(info.side)} 메인${info.slot + 1} ${actor.character} ↔ 서브${subIndex - 1} ${sub.character}`;
      }

      state.log = log;
      advanceTurn(state);
      return state;
    }

      const names = Object.keys(characters);
      const copy = [...names];

      while (result.length < 4 && copy.length) {
        const i = Math.floor(Math.random() * copy.length);
        result.push(copy.splice(i, 1)[0]);
      }
      return result;
    }

    function renderUnit(unit, active = false) {
      if (!unit) return `<div class="unit-row dead"><div class="unit-name">빈 자리</div></div>`;
      const isDead = !alive(unit);
      const hpPercent = unit.maxHp > 0 ? Math.max(0, unit.hp / unit.maxHp * 100) : 0;
      const classes = ["unit-row"];
      if (active && !isDead) classes.push("active");
      if (isDead) classes.push("dead");
      const deadLabel = isDead ? " [전투불능]" : "";
      const stateText = isDead ? "행동 불가 / 로테이션 불가" : getStateText(unit);
      return `<div class="${classes.join(" ")}"><div class="unit-name">${unit.character || "빈 자리"}${deadLabel}</div><div class="unit-detail">HP ${unit.hp} / ${unit.maxHp}<br>공격 ${unit.atk} / 방어 ${unit.def}<br>${stateText}</div><div class="hpbar"><div class="hpfill" style="width:${hpPercent}%"></div></div></div>`;
    }

      showScreen("partyBattle");

      leftPartyTitle.textContent = sideLabel(leftSide);
      rightPartyTitle.textContent = sideLabel(rightSide);

      leftMainList.innerHTML = [0, 1].map(i => renderUnit(state.teams[leftSide][i], info.side === leftSide && info.slot === i)).join("");
      leftSubList.innerHTML = [2, 3].map(i => renderUnit(state.teams[leftSide][i], false)).join("");
      rightMainList.innerHTML = [0, 1].map(i => renderUnit(state.teams[rightSide][i], info.side === rightSide && info.slot === i)).join("");
      rightSubList.innerHTML = [2, 3].map(i => renderUnit(state.teams[rightSide][i], false)).join("");

        return;
      }

      const actor = getTeam(state, info.side)[info.slot];
      partyTurnText.textContent = `${state.round}라운드 - ${sideLabel(info.side)} 메인${info.slot + 1} ${actor.character} 행동`;
      partyActionButtons.innerHTML = "";

      const myTurn = currentMode === "single" ? info.side === "player" : info.side === mySide;

      if (!myTurn) {
        const wait = document.createElement("div");
        wait.className = "status";

        else wait.textContent = `${sideLabel(info.side)} 턴입니다. 상대 행동을 기다리는 중...`;
        partyActionButtons.appendChild(wait);
        return;

      if (pendingPartySkillId) {
        const skill = skills[pendingPartySkillId];

        title.className = "status";
        title.textContent = `[${skill.name}] 대상 선택`;
        partyActionButtons.appendChild(title);

        [0, 1].forEach(slot => {
          const target = state.teams[enemySide][slot];
          const btn = document.createElement("button");
          btn.className = "target-button";
          btn.disabled = !alive(target);
          const targetDead = !alive(target);
          const targetLabel = targetDead ? `${target?.character || "빈 자리"} [전투불능]` : `${target?.character || "빈 자리"}`;
          btn.innerHTML = `<div class="skill-name">${sideLabel(enemySide)} 메인${slot + 1} ${targetLabel}</div><div class="skill-desc">HP ${target?.hp || 0} / ${target?.maxHp || 0}</div>`;
          btn.addEventListener("click", () => handlePartySkill(pendingPartySkillId, enemySide, slot));
          partyActionButtons.appendChild(btn);
        });

        const cancel = document.createElement("button");
        cancel.className = "secondary";
        cancel.textContent = "취소";
        cancel.addEventListener("click", () => { pendingPartySkillId = null; renderPartyBattle(); });
        partyActionButtons.appendChild(cancel);
        return;
      }

      getSkillListForPlayer(actor).forEach(skillId => {
        const skill = skills[skillId];
        const btn = document.createElement("button");

        btn.innerHTML = `<div class="skill-name">${skill.name}</div><div class="skill-power">${skill.powerText}</div><div class="skill-desc">${skill.desc}</div>`;
        btn.addEventListener("click", () => {
          if (isTargetSkill(skill)) {
            pendingPartySkillId = skillId;
            renderPartyBattle();
          } else {
            handlePartySkill(skillId);
          }
        });
        partyActionButtons.appendChild(btn);
      });

      [2, 3].forEach(subIndex => {
        const sub = state.teams[info.side][subIndex];
        const btn = document.createElement("button");
        btn.className = "rotate-button secondary";
        btn.disabled = !alive(sub);
        const mainLabel = `메인${info.slot + 1}`;
        const subLabel = `서브${subIndex - 1}`;
        btn.textContent = alive(sub) ? `로테이션: ${mainLabel} ${actor.character} ↔ ${subLabel} ${sub?.character || "빈 자리"}` : `로테이션 불가: ${subLabel} ${sub?.character || "빈 자리"} [전투불능]`;
        btn.addEventListener("click", () => handlePartyRotate(subIndex));
        partyActionButtons.appendChild(btn);
      });
    }

    async function handlePartySkill(skillId, targetSide = null, targetSlot = null) {
      pendingPartySkillId = null;

      if (currentMode === "single") {
        singlePartyState = processPartySkill(singlePartyState, skillId, targetSide, targetSlot);
        renderPartyBattle();
        triggerAiIfNeeded();
        return;
      }

      if (currentMode === "online") {
        const roomRef = ref(db, "rooms/" + currentRoomCode);
        const snapshot = await get(roomRef);
        if (!snapshot.exists()) return;
        const room = snapshot.val();
        const battle = room.state.battle;
        if (!battle || battle.winner) return;
        const info = getTurnInfo(battle);
        if (info.side !== mySide) return alert("아직 내 턴이 아닙니다.");
        const newBattle = processPartySkill(battle, skillId, targetSide, targetSlot);
        await update(roomRef, { "state/battle": newBattle, updatedAt: Date.now() });
      }
    }

    async function handlePartyRotate(subIndex) {
      pendingPartySkillId = null;

      if (currentMode === "single") {
        singlePartyState = processPartyRotate(singlePartyState, subIndex);
        renderPartyBattle();
        triggerAiIfNeeded();
        return;
      }

      if (currentMode === "online") {
        const roomRef = ref(db, "rooms/" + currentRoomCode);
        const snapshot = await get(roomRef);
        if (!snapshot.exists()) return;
        const room = snapshot.val();
        const battle = room.state.battle;
        if (!battle || battle.winner) return;
        const info = getTurnInfo(battle);
        if (info.side !== mySide) return alert("아직 내 턴이 아닙니다.");
        const newBattle = processPartyRotate(battle, subIndex);
        await update(roomRef, { "state/battle": newBattle, updatedAt: Date.now() });
      }
    }

    function chooseAiSkill(actor) {
      const list = getSkillListForPlayer(actor);
      const heal = list.find(id => skills[id].type === "heal");
      if (heal && actor.hp <= actor.maxHp * 0.45 && Math.random() < 0.65) return heal;
      const guard = list.find(id => skills[id].type === "guard");
      if (guard && actor.hp <= actor.maxHp * 0.35 && Math.random() < 0.45) return guard;
      return list[Math.floor(Math.random() * list.length)];
    }

    function tryAiRotate() {
      if (!singlePartyState || singlePartyState.winner) return false;
      const state = singlePartyState;
      const info = getTurnInfo(state);
      if (info.side !== "ai") return false;
      const team = state.teams.ai;
      const actor = team[info.slot];
      if (!alive(actor)) return false;
      const aliveSubs = [2, 3].filter(i => alive(team[i]));
      if (aliveSubs.length === 0) return false;
      const hpRate = actor.hp / actor.maxHp;
      if (hpRate > 0.35) return false;
      if (Math.random() > 0.65) return false;
      aliveSubs.sort((a, b) => (team[b].hp / team[b].maxHp) - (team[a].hp / team[a].maxHp));
      singlePartyState = processPartyRotate(state, aliveSubs[0]);
      return true;
    }

    function aiAction() {
      if (!singlePartyState || singlePartyState.winner) return;
      const info = getTurnInfo(singlePartyState);
      if (info.side !== "ai") return;
      if (tryAiRotate()) {
        renderPartyBattle();
        triggerAiIfNeeded();
        return;
      }
      const actor = singlePartyState.teams.ai[info.slot];
      const skillId = chooseAiSkill(actor);
      const skill = skills[skillId];
      if (isTargetSkill(skill)) {
        const targets = [0, 1].filter(i => alive(singlePartyState.teams.player[i]));
        const targetSlot = targets[Math.floor(Math.random() * targets.length)];
        singlePartyState = processPartySkill(singlePartyState, skillId, "player", targetSlot);
      } else {
        singlePartyState = processPartySkill(singlePartyState, skillId);
      }
      renderPartyBattle();
      triggerAiIfNeeded();
    }

    function triggerAiIfNeeded() {
      if (!singlePartyState || singlePartyState.winner) return;
      const info = getTurnInfo(singlePartyState);
      if (info.side === "ai" && !partyBusy) {
        partyBusy = true;
        renderPartyBattle();
        setTimeout(() => {
          partyBusy = false;
          aiAction();
        }, 900);
      }
    }

    async function resetBattle() {
      if (currentMode === "single") {
        openSingleMode();
        return;
      }
      if (currentMode === "online") {
        await leaveRoom();
      }
    }

    async function leaveRoom() {
      if (currentMode === "single") {
        backToMode();
        return;
      }
      if (!currentRoomCode || !mySide) return location.reload();
      if (mySide === "p1") {
        await remove(ref(db, "rooms/" + currentRoomCode));
      } else {
        await update(ref(db, "rooms/" + currentRoomCode), { "players/p2": false, updatedAt: Date.now() });
        location.reload();
      }
    }

    function backToMode() {
      currentMode = null;
      currentRoomCode = null;
      mySide = null;
      partySelection = [];
      singlePartyState = null;
      latestOnlineBattle = null;
      partyBusy = false;
      pendingPartySkillId = null;
      showScreen("mode");
    }

    onlineModeBtn.addEventListener("click", openOnlineMode);
    singleModeBtn.addEventListener("click", openSingleMode);
    createRoomBtn.addEventListener("click", createRoom);
    joinRoomBtn.addEventListener("click", joinRoom);
    backToModeBtn.addEventListener("click", backToMode);
    waitingBackBtn.addEventListener("click", leaveRoom);
    selectBackBtn.addEventListener("click", async () => {
      if (currentMode === "online" && currentRoomCode && mySide === "p1") await remove(ref(db, "rooms/" + currentRoomCode));
      backToMode();
    });
    partyResetBtn.addEventListener("click", resetBattle);
    partyLeaveBtn.addEventListener("click", leaveRoom);
    copyCodeBtn.addEventListener("click", async () => {
      if (!currentRoomCode) return;
      try {
        await navigator.clipboard.writeText(currentRoomCode);
        alert("방 코드 복사 완료!");
      } catch {
        alert("복사 실패. 방 코드를 직접 보내줘: " + currentRoomCode);
      }
    });
  </script>
</body>
</html>
